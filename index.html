<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
<title>DavPanel - Login</title>

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #000;
    color: #fff;
}

/* GRID */
.bg-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}

/* LOGIN CENTRAL */
.login {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* BOX */
.box {
    width: 320px;
    padding: 35px;
    border-radius: 16px;
    background: #050505;
    border: 1px solid #1a1a1a;
    text-align: center;
}

/* LOGO */
.logo {
    width: 70px;
    height: 70px;
    margin: auto;
    margin-bottom: 15px;

    border-radius: 18px;
    background: #000;

    display: flex;
    align-items: center;
    justify-content: center;
}

.logo img {
    width: 60%;
}

/* TITLE */
h1 {
    font-size: 22px;
    margin-bottom: 5px;
}

p {
    font-size: 13px;
    opacity: 0.6;
    margin-bottom: 20px;
}

/* INPUT */
.input {
    position: relative;
    margin-bottom: 12px;
}

.input input {
    width: 100%;
    padding: 12px 12px 12px 38px;

    background: #000;
    border: 1px solid #333;
    color: #fff;
    border-radius: 8px;
}

/* ICON */
.input svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    stroke: #888;
}

/* BOTÃO LOGIN */
.btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;

    border-radius: 8px;
    border: 1px solid #fff;

    background: transparent;
    color: #fff;

    cursor: pointer;
    transition: 0.25s;
}

.btn:hover {
    background: #fff;
    color: #000;
}

/* BOTÃO KEY */
.key-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;

    border-radius: 8px;
    border: 1px solid #222;

    background: #0a0a0a;
    color: #ccc;

    cursor: pointer;
    transition: 0.25s;
}

.key-btn:hover {
    border-color: #fff;
    color: #fff;
}

/* ERRO */
#error {
    display: block;
    margin-top: 10px;
    font-size: 12px;
    color: #aaa;
}

    /* impede seleção de texto */
body {
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
}
    
    html, body {
    height: 100%;
    overflow: hidden;
}
    
</style>
</head>

<body>


<section class="login">

<div class="box">

    <div class="logo">
        <img src="logo.gif">
    </div>

    <h1>Acessar Painel</h1>
    <p>Entre com sua key</p>

    <!-- USER -->
    <div class="input">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zM2 22c0-4 4-7 10-7s10 3 10 7"/>
        </svg>
        <input type="text" id="user" placeholder="Usuário">
    </div>

    <!-- PASS -->
    <div class="input">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M6 10V7a6 6 0 0112 0v3M6 10h12v10H6z"/>
        </svg>
        <input type="password" id="pass" placeholder="Senha">
    </div>

    <!-- LOGIN -->
    <button class="btn" id="loginBtn">Entrar</button>

    <!-- KEY -->
    <button class="key-btn" id="keyBtn">
    <svg viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.5 12h11l2-8H6"></path>
    </svg>
    Adquirir Key
</button>

<script>
document.getElementById("keyBtn").addEventListener("click", () => {
    window.location.href = "https://davspace.mginex.site/";
});
</script>

    <span id="error"></span>

</div>

</section>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAyTGNuOSjsmfm38z5Mur8vfiTmp8mZN8I",
  authDomain: "davpanel.firebaseapp.com",
  projectId: "davpanel",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("loginBtn").onclick = async () => {

    const user = document.getElementById("user").value.trim();
    const key  = document.getElementById("pass").value.trim();

    if (!user || !key) {
        document.getElementById("error").innerText = "Preencha tudo";
        return;
    }

    try {
        const ref = doc(db, "keys", key);
        const snap = await getDoc(ref);

        if (!snap.exists()) {
            document.getElementById("error").innerText = "Key inválida";
            return;
        }

        const data = snap.data();

        /* validações */
        const now = new Date();
        const expire = data.expiresAt?.toDate();

        if (!data.ativo) {
            document.getElementById("error").innerText = "Key desativada";
            return;
        }

        if (data.user !== user) {
            document.getElementById("error").innerText = "Usuário inválido";
            return;
        }

        if (expire && now > expire) {
            document.getElementById("error").innerText = "Key expirada";
            return;
        }

        /* sucesso */
        localStorage.setItem("auth", "true");
        window.location.href = "panel.html";

    } catch (e) {
        document.getElementById("error").innerText = "Erro ao verificar";
        console.error(e);
    }
};
    
    
</script>
